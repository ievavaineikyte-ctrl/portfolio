<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <rect x="40" y="50" width="560" height="280" rx="12" fill="#1e293b" opacity="0.35"/>
  <path d="M120 280 L200 180 L280 220 L360 140 L440 200 L520 120" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.9"/>
  <circle cx="200" cy="180" r="14" fill="#f97316" filter="url(#glow)"/>
  <circle cx="280" cy="220" r="12" fill="#5eead4" filter="url(#glow)"/>
  <circle cx="360" cy="140" r="16" fill="#fb7185" filter="url(#glow)"/>
  <circle cx="440" cy="200" r="11" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="520" cy="120" r="13" fill="#fbbf24" filter="url(#glow)"/>
  <text x="320" y="355" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="26" font-weight="700">ArcGIS Zemelapis</text>
  <text x="320" y="382" text-anchor="middle" fill="#ecfeff" font-family="Arial,sans-serif" font-size="15">Lietuvos miestai · Heatmap</text>
</svg>
